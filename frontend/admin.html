<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHROMEBEAST | Núcleo Administrativo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { cursor: default; }
        .admin-container { padding: 50px; max-width: 1200px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: rgba(255,255,255,0.02); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; }
        th { color: var(--cyber-neon); text-transform: uppercase; letter-spacing: 2px; }
        tr:hover { background: rgba(188, 19, 254, 0.05); }
        .delete-btn { background: none; border: 1px solid var(--cyber-pink); color: var(--cyber-pink); cursor: pointer; padding: 5px 10px; font-size: 0.6rem; }
        .delete-btn:hover { background: var(--cyber-pink); color: #fff; }
    </style>
</head>
<body style="cursor: auto;">
    <div class="admin-container">
        <h1 class="chrome-title" style="font-size: 3rem;">SINAIS_RECEBIDOS</h1>
        <a href="index.html" class="gothic-neon-btn" style="text-decoration: none; font-size: 0.6rem; padding: 10px 20px;">VOLTAR_AO_HUB</a>
        
        <table id="messages-table">
            <thead>
                <tr>
                    <th>DATA/HORA</th>
                    <th>OPERADOR</th>
                    <th>E-MAIL</th>
                    <th>PACOTE_DE_DADOS</th>
                    <th>AÇÃO</th>
                </tr>
            </thead>
            <tbody id="messages-body">
                <!-- Dados injetados aqui -->
            </tbody>
        </table>
    </div>

    <script src="api.js"></script>
    <script>
        const api = window.ChromeBeastApi;
        const body = document.getElementById('messages-body');

        async function loadMessages() {
            body.innerHTML = "";
            try {
                const data = await api.listMessages();
                const sortedMessages = [...data].sort((a, b) => {
                    return new Date(b.timestamp) - new Date(a.timestamp);
                });

                sortedMessages.forEach(msg => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${new Date(msg.timestamp).toLocaleString('pt-BR')}</td>
                        <td>${msg.name}</td>
                        <td>${msg.email}</td>
                        <td>${msg.message}</td>
                        <td><button class="delete-btn" onclick="deleteMessage(${msg.id})">PURGAR</button></td>
                    `;
                    body.appendChild(tr);
                });

                if (!sortedMessages.length) {
                    body.innerHTML = '<tr><td colspan="5">NENHUM_SINAL_CAPTURADO.</td></tr>';
                }
            } catch (error) {
                body.innerHTML = `<tr><td colspan="5">ERRO: ${error.message || 'NÚCLEO_ADMIN_OFFLINE'}.</td></tr>`;
            }
        }

        async function deleteMessage(id) {
            if (confirm("CONFIRMAR_PROTOCOLO_DE_PURGA?")) {
                try {
                    await api.deleteMessage(id);
                    loadMessages();
                } catch (error) {
                    body.innerHTML = `<tr><td colspan="5">ERRO: ${error.message || 'FALHA_NA_PURGA'}.</td></tr>`;
                }
            }
        }

        loadMessages();
    </script>
</body>
</html>
